<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f1e"/>
      <stop offset="100%" style="stop-color:#1a1535"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="16" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Purple border glow -->
  <rect width="512" height="512" rx="110" fill="none" stroke="#7c3aed" stroke-width="12" opacity="0.8" filter="url(#outerGlow)"/>
  <rect x="6" y="6" width="500" height="500" rx="106" fill="none" stroke="#8b5cf6" stroke-width="6" opacity="0.6"/>
  <!-- Glossy top shine -->
  <ellipse cx="256" cy="80" rx="180" ry="60" fill="white" opacity="0.05"/>
  <!-- Dollar sign neon glow (outer) -->
  <text x="256" y="340" font-size="320" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900"
        fill="#f59e0b" opacity="0.3" filter="url(#outerGlow)">$</text>
  <!-- Dollar sign neon (inner bright) -->
  <text x="256" y="340" font-size="320" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900"
        fill="none" stroke="#fbbf24" stroke-width="12" filter="url(#glow)" opacity="0.9">$</text>
  <!-- Dollar sign solid core -->
  <text x="256" y="340" font-size="320" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900"
        fill="#fde68a" opacity="0.95">$</text>
</svg>
